<!DOCTYPE html>

<head>

<title>Inverter Gun</title>

<link rel="stylesheet" href="../StyleCSSVideojuegos.css">

<style>
    /* Overlay para activar input */
    .game-overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
        cursor:pointer;
        z-index:10;
    }

    .iframe-wrap{
        position:relative;
        width:660px;
        height:596px;
    }

    .iframe-wrap iframe{
        width:100%;
        height:100%;
        border:0;
    }
</style>
