<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MultipLess</title>

<link rel="stylesheet" href="../StyleCSSVideojuegos.css">

<style>
    /* Overlay para activar input */
    .game-overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
        cursor:pointer;
        z-index:10;
    }

    .iframe-wrap{
        position:relative;
        width:980px;
        height:620px;
    }

    .iframe-wrap iframe{
        width:100%;
        height:100%;
        border:0;
    }
</style>

</head>

<body>

<header>
    <a href="../index.html">← Volver al Inicio</a>
</header>

<div class="container">

    <div class="videogame-card">

        <div class="main-panel">

            <div class="videogame-header">

                <div class="avatar-frame">
                    <img src="https://img.itch.zone/aW1nLzUwNzU4NDUucG5n/original/PNHpYw.png" class="avatar">
                </div>

            </div>

            <div class="section">

                <h2>Información</h2>

                <div class="info-item">
                    <div class="label">Título</div>
                    <div class="value">MultipLess</div>
                </div>

                <div class="info-item">
                    <div class="label">Desarrolladores</div>
                    <div class="value"><a href="../Personas/CarlosRodriguez.html">Carlos Rodríguez</a></div>
                </div>

                <div class="info-item">
                    <div class="label">Fecha de Publicación</div>
                    <div class="value">2021 / 01 / 29</div>
                </div>

                <div class="info-item">
                    <div class="label">Género</div>
                    <div class="value">Puzzles</div>
                </div>

                <div class="info-item">
                    <div class="label">Herramientas</div>
                    <div class="value">Unity</div>
                </div>

                <div class="info-item">
                    <div class="label">Plataformas</div>
                    <div class="value">Web, Windows</div>
                </div>

                <div class="info-item">
                    <div class="label">Idiomas</div>
                    <div class="value">Inglés</div>
                </div>

                <div class="info-item">
                    <div class="label">Tiendas</div>
                    <div class="value">
                        <a href="https://carlos-7x.itch.io/multipless">Itch.io</a>
                    </div>
                </div>

            </div>

            <div class="section">
                <h2>Descripción</h2>

                <div class="text">
                    Desconocida
                </div>
            </div>

            <div class="section">
                <h2>Jugar</h2>
            
                <div class="iframe-wrap">
                    <div class="game-overlay" onclick="this.style.display='none'">
                        Haz clic para jugar
                    </div>
            
                    <iframe 
                        src="https://html-classic.itch.zone/html/3275612/index.html"
                        allowfullscreen
                    ></iframe>
                </div>
            </div>

        </div>

        <div class="image-panel">

            <h2>Imágenes</h2>
            <img src="https://img.itch.zone/aW1hZ2UvODk5MjUyLzUwNzYwMzUucG5n/347x500/PVAyUB.png">
            <img src="https://img.itch.zone/aW1hZ2UvODk5MjUyLzUwNzYwMzQucG5n/347x500/raOcfb.png">
            <img src="https://img.itch.zone/aW1hZ2UvODk5MjUyLzUwNzYwMzYucG5n/347x500/HsaFCT.png">
        </div>

    </div>

</div>

</body>
</html>
