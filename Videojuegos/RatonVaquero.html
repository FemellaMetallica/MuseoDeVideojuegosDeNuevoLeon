<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ratón Vaquero</title>

<link rel="stylesheet" href="../StyleCSSVideojuegos.css">

<style>
    /* Overlay para activar input */
    .game-overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
        cursor:pointer;
        z-index:10;
    }

    .iframe-wrap{
        position:relative;
        width:660px;
        height:596px;
    }

    .iframe-wrap iframe{
        width:100%;
        height:100%;
        border:0;
    }
</style>

</head>

<body>

<header>
    <a href="../index.html">← Volver al Inicio</a>
</header>

<div class="container">

    <div class="videogame-card">

        <div class="main-panel">

            <div class="videogame-header">

                <div class="avatar-frame">
                    <img src="https://img.itch.zone/aW1nLzEzOTM5NjYyLnBuZw==/315x250%23c/dxFpgj.png" class="avatar">
                </div>

            </div>

            <div class="section">

                <h2>Información</h2>

                <div class="info-item">
                    <div class="label">Título</div>
                    <div class="value">Ratón Vaquero</div>
                </div>

                <div class="info-item">
                    <div class="label">Desarrolladores</div>
                    <div class="value"><a href="../Personas/AzureBIT8.html">AzureBIT8</a></div>
                </div>

                <div class="info-item">
                    <div class="label">Fecha de Publicación</div>
                    <div class="value">En Desarrollo</div>
                </div>

                <div class="info-item">
                    <div class="label">Género</div>
                    <div class="value">Cartas</div>
                </div>

                <div class="info-item">
                    <div class="label">Herramientas</div>
                    <div class="value">PICO-8</div>
                </div>

                <div class="info-item">
                    <div class="label">Plataformas</div>
                    <div class="value">Web, Windows, macOS, Linux</div>
                </div>

                <div class="info-item">
                    <div class="label">Idiomas</div>
                    <div class="value">Inglés</div>
                </div>

                <div class="info-item">
                    <div class="label">Tiendas</div>
                    <div class="value">
                        <a href="https://azure-bit8.itch.io/raton-vaquero">Itch.io</a>
                    </div>
                </div>

            </div>

            <div class="section">
                <h2>Descripción</h2>

                <div class="text">
                    Desconocida
                </div>
            </div>
        
        </div>

        <div class="image-panel">
            <h2>Imágenes</h2>
        </div>
    </div>
</div>

</body>
</html>
